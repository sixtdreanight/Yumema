<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>梦间 / Yumema</title>
    <script>
      // Detect system dark mode before first paint, avoid FOUC
      if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.documentElement.classList.add('dark');
      }
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
        document.documentElement.classList.toggle('dark', e.matches);
      });
    </script>
    <style>
      .rt-SelectContent { background: #ffffff !important; background-image: none !important; }
      .dark .rt-SelectContent { background: #1f1f23 !important; background-image: none !important; }
      .rt-PopoverContent { background: #ffffff !important; background-image: none !important; }
      .dark .rt-PopoverContent { background: #1f1f23 !important; background-image: none !important; }
      .rt-SelectViewport { background: transparent !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
